name: release-please

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "CHANGELOG.md"
      - "release-please-config.json"
      - ".release-please-manifest.json"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Node runtime
        run: |
          node --version
          npm --version

      - name: Open or update release PR
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npx --yes release-please@17.3.0 release-pr \
            --token="${RELEASE_PLEASE_TOKEN}" \
            --repo-url="${{ github.repository }}" \
            --target-branch="${{ github.ref_name }}" \
            --config-file="release-please-config.json" \
            --manifest-file=".release-please-manifest.json"

      - name: Create GitHub release and tag (if eligible)
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npx --yes release-please@17.3.0 github-release \
            --token="${RELEASE_PLEASE_TOKEN}" \
            --repo-url="${{ github.repository }}" \
            --target-branch="${{ github.ref_name }}" \
            --config-file="release-please-config.json" \
            --manifest-file=".release-please-manifest.json"
