name: live-network-verification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run deterministic suite
        run: go test ./... -cover

      - name: Run optional live API smoke
        env:
          RAYDIUM_MAINNET_API: https://api-v3.raydium.io
        run: go test ./api -run TestAPIRequestsAndCache -count=1
