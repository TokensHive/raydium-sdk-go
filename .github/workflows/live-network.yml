name: live-network-verification

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run deterministic suite
        run: go test ./... -cover

      - name: Run optional live API smoke
        env:
          SOLANA_RPC_HTTP: ${{ secrets.SOLANA_RPC_HTTP }}
        run: |
          RPC_ENDPOINT="${SOLANA_RPC_HTTP:-https://api.mainnet-beta.solana.com}"
          echo "Using SOLANA_RPC_HTTP endpoint: ${RPC_ENDPOINT}"
          SOLANA_RPC_HTTP="${RPC_ENDPOINT}" go test ./api -run TestLiveRPCGetEpochInfo -count=1 -tags=live
